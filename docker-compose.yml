# AI Memory Layer — Полный стек: OB1 + Honcho + общие PostgreSQL и эмбеддер
# =============================================================================
# Единый PostgreSQL (pg17) с базами ob1 и honcho.
# Один Infinity (deepvk/USER-bge-m3) на двоих.
# Caddy reverse proxy — единая точка входа (HTTP по умолчанию, TLS опционально).
# Минимум app-логики в этом репо — только оркестрация.
#
# Деплой:
#   cp .env.template .env   # заполнить ключи
#   ./setup.sh              # собрать образы OB1 и Honcho
#   docker compose up -d    # запустить стек
#
# Порты (наружу):
#   80 — Caddy reverse proxy (HTTP по умолчанию, TLS опционально).
#     /ob1 → OB1 MCP-сервер (knowledge base)
#     /honcho → Honcho API (user model)
#
# Порты (только localhost):
#   7997 — Infinity API (общий эмбеддер)
#   5432 — PostgreSQL (единый, базы ob1 + honcho)
#   6379 — Redis Honcho
#
# Системные требования: 12 GB RAM, 30 GB диск

services:
  # =========================================================================
  # Единый PostgreSQL (pg17 + pgvector) — две базы, два пользователя
  # =========================================================================
  postgres:
    image: ${IMAGE_PGVECTOR:-pgvector/pgvector:pg17}
    pull_policy: never
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "max_connections=40"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 768M
    # Единый инстанс вместо двух — экономия ~200 MB RAM.

  # =========================================================================
  # One-shot: создаёт базы и пользователей, включает pgvector
  # =========================================================================
  db-init:
    image: ${IMAGE_PGVECTOR:-pgvector/pgvector:pg17}
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo "Creating users and databases..."

        psql -h postgres -U postgres -v ON_ERROR_STOP=1 <<SQL
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'ob1') THEN
              CREATE ROLE ob1 WITH LOGIN PASSWORD '${OB1_DB_PASSWORD}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'honcho') THEN
              CREATE ROLE honcho WITH LOGIN PASSWORD '${HONCHO_DB_PASSWORD}';
            END IF;
          END
          \$\$;
        SQL

        for db in ob1 honcho; do
          psql -h postgres -U postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname='$$db'" | grep -q 1 \
            || psql -h postgres -U postgres -v ON_ERROR_STOP=1 \
                 -c "CREATE DATABASE $$db OWNER $$db"
        done

        psql -h postgres -U postgres -v ON_ERROR_STOP=1 -d ob1 \
          -c "CREATE EXTENSION IF NOT EXISTS vector"
        psql -h postgres -U postgres -v ON_ERROR_STOP=1 -d honcho \
          -c "CREATE EXTENSION IF NOT EXISTS vector"
        echo "Done."
    environment:
      PGPASSWORD: ${PG_SUPERUSER_PASSWORD}
      OB1_DB_PASSWORD: ${OB1_DB_PASSWORD}
      HONCHO_DB_PASSWORD: ${HONCHO_DB_PASSWORD}
    # TODO: добавить pg_upgrade при смене мажорной версии PostgreSQL

  # =========================================================================
  # Общий эмбеддер — один на двоих
  # =========================================================================
  embedding:
    image: ${IMAGE_INFINITY:-michaelf34/infinity:0.0.77-cpu}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:7997:7997"
    command:
      - "v2"
      - "--model-id"
      - "${EMBEDDING_MODEL:-deepvk/USER-bge-m3}"
      - "--engine"
      - "torch"
      - "--port"
      - "7997"
    volumes:
      - embedding-cache:/app/.cache/huggingface
    mem_limit: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # =========================================================================
  # OB1 — Knowledge Base
  # =========================================================================
  ob1-server:
    image: ai-memory-sloy/ob1-server:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:7981:7981"
    environment:
      DATABASE_URL: postgresql://ob1:${OB1_DB_PASSWORD}@postgres:5432/ob1
      INFINITY_URL: http://embedding:7997
      INFINITY_MODEL: ${EMBEDDING_MODEL:-deepvk/USER-bge-m3}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      MCP_ACCESS_KEY: ${OB1_MCP_ACCESS_KEY}
      OPEN_BRAIN_CITATION_BASE_URL: ${OB1_CITATION_URL:-http://localhost/ob1}
    depends_on:
      db-init:
        condition: service_completed_successfully
      embedding:
        condition: service_healthy
    mem_limit: 512M

  # =========================================================================
  # Honcho — User Model
  # =========================================================================
  honcho-redis:
    image: ${IMAGE_REDIS:-redis:8.2}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${HONCHO_REDIS_PASSWORD} --save 900 1 --save 300 10
    environment:
      - REDISCLI_AUTH=${HONCHO_REDIS_PASSWORD}
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128M

  honcho-api:
    image: ai-memory-sloy/honcho-api:latest
    pull_policy: never
    entrypoint: ["sh", "docker/entrypoint.sh"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD}@postgres:5432/honcho
      CACHE_URL: redis://:${HONCHO_REDIS_PASSWORD}@honcho-redis:6379/0?suppress=true
      CACHE_ENABLED: "true"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
      LLM_OPENAI_API_KEY: ${LLM_API_KEY}
      EMBEDDING_VECTOR_DIMENSIONS: "1024"
      EMBEDDING_MODEL_CONFIG__MODEL: ${EMBEDDING_MODEL:-deepvk/USER-bge-m3}
      EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: http://embedding:7997
      DERIVER_ENABLED: "true"
      DERIVER_WORKERS: "1"
      DERIVER_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      SUMMARY_ENABLED: "true"
      SUMMARY_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DREAM_ENABLED: "true"
      DREAM_DEDUCTION_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DREAM_INDUCTION_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      AUTH_USE_AUTH: "true"
      AUTH_JWT_SECRET: ${HONCHO_JWT_SECRET}
      HONCHO_API_KEY: ${HONCHO_API_KEY}
      DO_NOT_TRACK: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VECTOR_STORE_TYPE: pgvector
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db-init:
        condition: service_completed_successfully
      honcho-redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    mem_limit: 1G

  # =========================================================================
  # Honcho Deriver — background worker (queue processor)
  # =========================================================================
  honcho-deriver:
    image: ai-memory-sloy/honcho-api:latest
    pull_policy: never
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    restart: unless-stopped
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD}@postgres:5432/honcho
      CACHE_URL: redis://:${HONCHO_REDIS_PASSWORD}@honcho-redis:6379/0?suppress=true
      CACHE_ENABLED: "true"
      LLM_OPENAI_API_KEY: ${LLM_API_KEY}
      EMBEDDING_VECTOR_DIMENSIONS: "1024"
      EMBEDDING_MODEL_CONFIG__MODEL: ${EMBEDDING_MODEL:-deepvk/USER-bge-m3}
      EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: http://embedding:7997
      DERIVER_ENABLED: "true"
      DERIVER_WORKERS: "1"
      DERIVER_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      SUMMARY_ENABLED: "true"
      SUMMARY_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DREAM_ENABLED: "true"
      DREAM_DEDUCTION_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      DREAM_INDUCTION_MODEL_CONFIG__MODEL: ${LLM_MODEL}
      DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${LLM_BASE_URL}/v1
      AUTH_USE_AUTH: "true"
      AUTH_JWT_SECRET: ${HONCHO_JWT_SECRET}
      HONCHO_API_KEY: ${HONCHO_API_KEY}
      DO_NOT_TRACK: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VECTOR_STORE_TYPE: pgvector
    depends_on:
      honcho-api:
        condition: service_healthy
    mem_limit: 512M

  # =========================================================================
  # Caddy — reverse proxy (HTTP по умолчанию, TLS опционально)
  # =========================================================================
  caddy:
    image: ${IMAGE_CADDY:-caddy:2-alpine}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "0.0.0.0:${CADDY_HTTP_PORT:-80}:80"
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CADDY_HTTP_PORT=${CADDY_HTTP_PORT:-80}
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      ob1-server:
        condition: service_started
      honcho-api:
        condition: service_started

configs:
  caddy_config:
    content: |
      {
      }

      http:// {
          handle_path /ob1/* {
              reverse_proxy ob1-server:7981
          }

          handle_path /honcho/* {
              reverse_proxy honcho-api:8000
          }

          respond /health "ok" 200
      }

volumes:
  pgdata:
  embedding-cache:
  honcho-redis-data:
  caddy-data:
  caddy-config:
